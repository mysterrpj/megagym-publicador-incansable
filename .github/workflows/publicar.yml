name: Publicador Automatico MEGAGYM

on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM hora Perú (UTC-5)
    - cron: '0 1 * * *'    # 8:00 PM hora Perú (UTC-5)

  # Permite ejecutar manualmente desde la interfaz de GitHub
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests google-generativeai openai google-api-python-client google-auth

      - name: Ejecutar el publicador
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python publisher.py
