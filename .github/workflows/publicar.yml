name: Publicador Automatico MEGAGYM

on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM hora Perú (UTC-5)
    - cron: '0 1 * * *'    # 8:00 PM hora Perú (UTC-5)

  # Permite ejecutar manualmente desde la interfaz de GitHub
  workflow_dispatch:

concurrency:
  group: publicador-megagym
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests google-generativeai openai google-api-python-client google-auth

      - name: Sincronizar historial antes de publicar
        run: git pull --rebase origin master

      - name: Ejecutar el publicador
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python publisher.py

      - name: Guardar historial de fotos en el repositorio
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git pull --rebase origin master
          git add historial_fotos.json
          git diff --staged --quiet || git commit -m "chore: actualizar historial de fotos usadas"
          git pull --rebase origin master
          git push
