name: Publicador Automatico MEGAGYM

on:
  schedule:
    # Corre todos los dias a las 15:00 UTC (10:00 AM hora Peru/Colombia/Lima)
    # Para cambiar la hora, modifica el valor cron:
    # Formato: minuto hora dia mes dia_semana
    # Herramienta util: https://crontab.guru
    - cron: '15 17 * * *'  # 12:15 PM hora Perú / Colombia (UTC-5)

  # Permite ejecutar manualmente desde la interfaz de GitHub
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests google-generativeai openai

      - name: Ejecutar el publicador
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python publisher.py
